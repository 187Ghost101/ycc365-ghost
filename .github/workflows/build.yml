name: 🏴‍☠️ Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐧 Install Android build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            aapt apksigner zipalign default-jdk-headless wget unzip

      - name: 📦 Install cmdline-tools
        run: |
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q commandlinetools-linux-*.zip
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          sudo mv cmdline-tools /opt/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV

      - name: 📲 Install platform-33
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "platform-tools" \
            "build-tools;33.0.0"

      - name: 🏴‍☠️ Run build script
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          export ANDROID_HOME=/opt/android-sdk
          chmod +x build.sh
          ./build.sh

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ycc365-ghost-apk
          path: bin/ycc365-ghost-1.0.0.apk
          if-no-files-found: error

      - name: 🚀 Auto-release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/ycc365-ghost-1.0.0.apk
          body: |
            🏴‍☠️ **YCC365 Ghost Scanner v${{ github.ref_name }}**

            Signé Ghost1o1 — IoT Pentest Toolkit
          draft: false
